[tool.pytest.ini_options]
minversion = "7.0"
# Test discovery
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

# Output verbosity & formatting
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
    "--no-header",
    "-rN",
    "--color=yes",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml:coverage.xml",
    "--cov-report=html:htmlcov",
    "--cov-fail-under=60",
]

# Custom markers
markers = [
    "unit: pure unit tests with no I/O",
    "integration: integration tests against mocked external services",
    "slow: tests that take >1 s to run",
]

# Suppress noisy third-party warnings
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]
