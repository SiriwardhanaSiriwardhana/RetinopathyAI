# ──────────────────────────────────────────────────────────────────────────────
# RetinopathyAI — Backend CI Pipeline
#
# Triggers : push / PR to main, develop, or any feature/* branch
# Jobs     : lint → test → coverage-report
# ──────────────────────────────────────────────────────────────────────────────

name: Backend CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # JOB 1 — Lint & Static Analysis
  # ============================================================================
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      - name: Install linting tools
        run: pip install ruff==0.4.4

      - name: Run Ruff linter
        run: ruff check app/ tests/ --output-format=github

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  # ============================================================================
  # JOB 2 — Unit & Integration Tests (matrix across Python versions)
  # ============================================================================
  test:
    name: "🧪 Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]      # add "3.11" here when ready

    env:
      # ── App settings (safe dummy values for CI) ────────────────────────────
      APP_NAME: "Retinopathy AI Backend"
      APP_VERSION: "1.0.0"
      DEBUG: "true"
      DATABASE_URL: "sqlite:///./test_retinopathy.db"
      SECRET_KEY: "ci-test-secret-key-not-for-production"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      UPLOAD_DIR: "uploads/retinal_images"
      MAX_IMAGE_SIZE_MB: "10"
      OPENAI_API_KEY: ""          # intentionally empty — uses fallback in tests
      CORS_ORIGINS: '["http://localhost:3000"]'

      # ── Firebase ── credentials supplied as a GitHub Secret (see README) ───
      # The conftest.py fully mocks Firebase, so this only needs to be a
      # syntactically valid path; the file does NOT need to exist.
      FIREBASE_CREDENTIALS: "ci-fake-credentials.json"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: backend/requirements-test.txt

      # ── Install ONLY the lightweight test dependencies ─────────────────────
      # Heavy GPU libs (torch, torchvision, firebase-admin) are mocked out
      # in conftest.py and are NOT installed here to keep CI fast.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      # ── Create a fake (empty) Firebase credentials file so the path check ──
      # in database.py doesn't throw FileNotFoundError before the mock kicks in
      - name: Create dummy Firebase credentials file
        run: |
          echo '{"type":"service_account","project_id":"ci-test","private_key_id":"ci","private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA0Z3VS5JJcds3xHn/ygWep4PAtEsHAd0jMDMFqfZOBqeWME2y\nnPN+MmJWpNKN7FXZqMiHIjBJPV3okA2HPIFKRGR0g55VRiRqLhZw3PCBF9mYNem\n1AKJlC7G6J3VbRMGNMIQIL7VOMnFg4NAlkFpGFuq22vT0YPt1C0NBZO3K0LLQFY\nPJq5n+CRZ7UcW/D8OL3sEbezJJPkKi0ByjZ4ot+7Wl6jg67fXPdN+sMQFdyKjjj\nowZhHBn0fDU5zXGrFbv0GFWH5W8r0x+P4Ow6JxGo48v9NhxHxZ3J7UhDBuEEhgL\ni9LBDLB0L+wU2F2hfkDovsTnm5mMlU7kgFjB+QIDAQABAoIBAHF3x3Uiv1Z/kJtK\n...\n-----END RSA PRIVATE KEY-----\n","client_email":"ci@ci-test.iam.gserviceaccount.com","client_id":"000","auth_uri":"https://accounts.google.com/o/oauth2/auth","token_uri":"https://oauth2.googleapis.com/token"}' \
            > ci-fake-credentials.json

      # ── Run pytest with coverage ───────────────────────────────────────────
      - name: Run tests
        run: |
          pytest \
            --tb=short \
            --color=yes \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -v

      # ── Upload coverage XML so the next job can publish it ─────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: backend/coverage.xml
          retention-days: 14

      # ── Upload HTML coverage report as downloadable artefact ──────────────
      - name: Upload HTML coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-py${{ matrix.python-version }}
          path: backend/htmlcov/
          retention-days: 14

  # ============================================================================
  # JOB 3 — Coverage Gate & Comment on PR
  # ============================================================================
  coverage:
    name: "📊 Coverage Report"
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    permissions:
      pull-requests: write

    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report-py3.12
          path: .

      - name: Post coverage comment to PR
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "RetinopathyAI Backend — Test Coverage"
          badge-title: "Coverage"
          hide-comment: false
          create-new-comment: false
          default-branch: main
          report-only-changed-files: true
